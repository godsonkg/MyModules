name: Update Guangdong Fuel Price

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"  # 北京时间 08:20

permissions:
  contents: write

concurrency:
  group: update-guangdong-fuel-price
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and validate current prices
        run: python3 Scripts/update_fuel.py

      - name: Commit price changes
        run: |
          if git diff --quiet -- data/guangdong_fuel.json; then
            echo "Fuel prices are unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/guangdong_fuel.json
          git commit -m "Update Guangdong fuel price"
          git push
